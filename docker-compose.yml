# ============================================================
# RHID MCP Server — docker-compose de produção (Swarm/Dokploy)
# ============================================================

services:
  rhid-mcp:
    image: ghcr.io/miranda-ale/rhdi-mcp:latest

    environment:
      - RHID_LOGIN=${RHID_LOGIN}
      - RHID_PASSWORD=${RHID_PASSWORD}
      - RHID_DOMAIN=${RHID_DOMAIN:-}
      - RHID_BASE_URL=${RHID_BASE_URL:-https://www.rhid.com.br/v2/api.svc}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "rhid-mcp"
