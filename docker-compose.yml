# ============================================================
# RHID MCP Server — docker-compose de produção
# ============================================================

services:
  rhid-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhid-mcp
    restart: unless-stopped

    ports:
      - "${MCP_PORT:-8765}:8765"

    environment:
      - RHID_LOGIN=${RHID_LOGIN}
      - RHID_PASSWORD=${RHID_PASSWORD}
      - RHID_DOMAIN=${RHID_DOMAIN:-}
      - RHID_BASE_URL=${RHID_BASE_URL:-https://www.rhid.com.br/v2/api.svc}
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # Limites de recursos (VPS Hostinger KVM 4)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # Logging estruturado com rotação
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "rhid-mcp"

    # Health check (redundante com o do Dockerfile, mas
    # garante visibilidade no docker compose ps)
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8765/mcp', timeout=5); assert r.status_code < 500"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

    # Segurança adicional
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp